version: '3.8'

services:

  nexbridge:
    build: .
    container_name: nexbridge
    ports:
      - "443:8443"
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_USER=nexbridge
      - DB_PASS=${DB_PASS}
      - JWT_SECRET=${JWT_SECRET}
      - SSL_KEYSTORE_PASSWORD=${SSL_KEYSTORE_PASSWORD}
      - TLS_CERT=/certs/nexbridge.crt
      - TLS_KEY=/certs/nexbridge.key
      - TLS_CA=/certs/ca.crt
      - VAULT_MASTER_KEY=${VAULT_MASTER_KEY}
      - KAFKA_BROKER=${KAFKA_BROKER:-}
    volumes:
      - ./certs:/certs:ro
      - nexbridge-vault:/data/vault
      - nexbridge-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexbridge-net

  postgres:
    image: postgres:16-alpine
    container_name: nexbridge-db
    environment:
      - POSTGRES_DB=nexbridge
      - POSTGRES_USER=nexbridge
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U nexbridge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexbridge-net

volumes:
  postgres-data:
  nexbridge-vault:
  nexbridge-logs:

networks:
  nexbridge-net:
    driver: bridge

spring:
  application:
    name: nexbridge
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/nexbridge
    username: ${DB_USER:nexbridge}
    password: ${DB_PASS:nexbridge}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BROKER:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

nexbridge:
  version: 1.0.0
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-prod}
    expiration-ms: 3600000
  rate-limit:
    default-requests-per-minute: 1000
  tls:
    cert-path: ${TLS_CERT:/certs/nexbridge.crt}
    key-path:  ${TLS_KEY:/certs/nexbridge.key}
    ca-path:   ${TLS_CA:/certs/ca.crt}
  vault:
    master-key: ${VAULT_MASTER_KEY:dev-vault-key-change-in-prod}
    store-path: ${VAULT_STORE:/data/vault.enc}
  audit:
    retain-days: 3650
  lgpd:
    auto-mask: true
  connector:
    default-timeout-ms: 5000
    health-check-interval-sec: 30
  observability:
    alerts:
      error-rate-threshold: 0.1
      latency-p99-threshold-ms: 2000.0
      check-interval-seconds: 60
  alerts:
    enabled: false
    slack-webhook-url:
    slack-channel: "#nexbridge-alerts"
    email-enabled: false
    email-to: []
    smtp-host: localhost
    smtp-port: 587
    smtp-user:
    smtp-password-ref:
    pagerduty-enabled: false
    pagerduty-routing-key:

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  metrics:
    tags:
      application: nexbridge
    distribution:
      percentiles-histogram:
        nexbridge.request.latency: true
      percentiles:
        nexbridge.request.latency: 0.5, 0.95, 0.99
      slo:
        nexbridge.request.latency: 100ms, 500ms, 1000ms
